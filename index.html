<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K4MILLZ</title>
<link rel="icon" type="image/x-icon" href="K4M.ico">
<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Playfair+Display&family=Quicksand&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:#ffe6f0;
  color:#1a1a1a;
  text-align:center;
  overflow-x:hidden;
  scroll-behavior:smooth;
  position:relative;
  transition:background 0.8s, color 0.8s;
}

/* DARK MODE */
body.dark-mode{
  background:#1a1a1a;
  color:#ffe6f0;
}
body.dark-mode nav{
  background:#330033dd;
  border-bottom:2px solid #ff66cc;
}
body.dark-mode nav a{
  color:#ff66cc;
}
body.dark-mode nav a:hover{
  color:#ff99cc;
}
body.dark-mode .landing-button{
  background:#4d004d;
  color:#ffe6f0;
}
body.dark-mode .landing-button:hover{
  background:#ff66cc;
  color:#1a1a1a;
  box-shadow:0 0 20px #ff99cc,0 0 40px #ff66cc;
}
body.dark-mode .section h2{
  color:#ff66cc;
}
body.dark-mode .contact a{
  color:#ff99cc;
}

/* NAVIGATION */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:#ffe6f0dd;
  padding:12px;
  border-bottom:2px solid #d63384;
  z-index:100;
  display:none;
}
nav a{
  margin:0 20px;
  font-weight:600;
  color:#d63384;
  transition:0.3s;
}
nav a:hover{
  transform:scale(1.1);
  color:#4d004d;
  text-shadow:0 0 8px #ff66cc;
}

/* LANDING PAGE */
#landing{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}
#landing h1{
  font-size:80px;
  letter-spacing:8px;
  color:#d63384;
  font-family:'Playfair Display',serif;
  position:relative;
  margin-bottom:20px;
  cursor:pointer;
  animation: pulse 3s infinite alternate;
}
@keyframes pulse{
  0%{color:#d63384; transform:scale(1);}
  50%{color:#ff66cc; transform:scale(1.05);}
  100%{color:#d63384; transform:scale(1);}
}
#landing h1::after{
  content:"";
  position:absolute;
  top:-10px;
  right:-50px;
  width:50px;
  height:50px;
  background-image:url('uwusite.png');
  background-size:contain;
  background-repeat:no-repeat;
}
#landing p{
  font-size:28px;
  font-style:italic;
  color:#4d004d;
  margin-bottom:40px;
}

/* boutons horizontaux */
.button-row{
  display:flex;
  gap:30px;
}
.landing-button{
  background:#d63384;
  color:white;
  border:none;
  border-radius:12px;
  padding:15px 40px;
  font-size:22px;
  cursor:pointer;
  transition:0.3s, box-shadow 0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.landing-button:hover{
  transform:scale(1.1);
  background:#4d004d;
  box-shadow:0 0 25px #ff66cc, 0 0 50px #ff99cc;
}

/* Dark mode toggle */
#dark-toggle{
  margin-top:20px;
  cursor:pointer;
  font-size:20px;
  padding:10px 20px;
  border-radius:12px;
  border:none;
  background:#d63384;
  color:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}
#dark-toggle:hover{
  transform:scale(1.1);
  background:#4d004d;
  box-shadow:0 0 25px #ff66cc, 0 0 50px #ff99cc;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
  display:none;
  opacity:0;
  transition:opacity 1s;
  position:relative;
}
.section.visible{opacity:1;}
.section h2{
  font-size:40px;
  color:#d63384;
  font-family:'Playfair Display',serif;
  margin-bottom:20px;
  opacity:0;
  transform:translateX(-50px);
  transition: all 1s;
}
.section h2.visible{opacity:1; transform:translateX(0);}
.section p{
  margin-bottom:15px;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.8s ease-out;
}
.section p.visible{opacity:1; transform:translateY(0);}
.section p:hover{
  color:#ff66cc;
  transform:scale(1.05);
}

/* PORTFOLIO */
.portfolio{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
  justify-items:center;
}
.portfolio img{
  width:100%;
  max-width:250px;
  border:10px solid #fff;
  border-bottom-width:30px;
  border-radius:8px;
  object-fit:cover;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s, box-shadow 0.3s;
  position:relative;
}
.portfolio img:hover{
  transform:scale(1.05) rotate(-1deg);
  box-shadow:0 0 25px #ff66cc,0 0 50px #ff99cc;
}

/* CITATION & SIGNATURE */
.citation{
  font-family:'Great Vibes',cursive;
  font-size:34px;
  margin-top:80px;
  color:#4d004d;
}
.signature{
  font-family:'Cinzel',serif;
  font-size:22px;
  text-align:right;
  max-width:900px;
  margin:auto;
  margin-bottom:40px;
}

/* CONTACT */
.contact a{
  display:block;
  margin:10px;
  font-size:20px;
  color:#d63384;
  transition:0.3s;
}
.contact a:hover{
  color:#ff66cc;
  text-shadow:0 0 8px #ff99cc;
}

/* FOOTER */
.footer-note{
  font-size:12px;
  opacity:0.7;
  margin-bottom:40px;
}

/* RESPONSIVE */
@media (max-width:768px){
  #landing h1{font-size:60px; letter-spacing:6px;}
  #landing p{font-size:22px;}
  .section h2{font-size:32px;}
  .section p{font-size:18px;}
  .citation{font-size:28px;}
  .signature{font-size:18px;}
  .contact a{font-size:18px;}
  .portfolio img{max-width:180px;}
  .landing-button{font-size:20px; padding:12px 30px;}
  .button-row{gap:20px; flex-direction:column;}
}
@media (max-width:480px){
  #landing h1{font-size:48px; letter-spacing:4px;}
  #landing p{font-size:18px;}
  .section h2{font-size:24px;}
  .section p{font-size:16px;}
  .citation{font-size:22px;}
  .signature{font-size:16px;}
  .contact a{font-size:16px;}
  .portfolio img{max-width:140px;}
  .landing-button{font-size:18px; padding:10px 25px;}
}

/* ANIMATIONS FLOTANTES SUBTILES */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}
.float-heart, .float-bow, .float-star, .float-palette, .float-paint{
  position:absolute;
  animation:float 5s ease-in-out infinite;
  pointer-events:none;
  opacity:0.3; /* beaucoup plus subtil */
  font-size:14px;
}
.float-heart{color:#ff99cc;}
.float-bow{color:#ff66cc;}
.float-star{color:#FFD700;}
.float-palette{color:#ffcc66;}
.float-paint{color:#ff9966;}
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing">
  <h1 id="landing-title">K4MILLZ</h1>
  <p>L’art en image</p>
  <div class="button-row">
    <button class="landing-button" data-target="about">À propos</button>
    <button class="landing-button" data-target="portfolio">Portfolio</button>
    <button class="landing-button" data-target="contact">Contact</button>
  </div>
  <button id="dark-toggle">Mode Dark / Light</button>
</div>
